name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. تسجيل الدخول إلى Docker Hub باستخدام السيكرتس الجديدة
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. بناء الـ Image ورفعها بالـ SHA (مهم للتتبع)
      - name: Build and Push Backend Image (with SHA tag)
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/smart-backend:${{ github.sha }} ./
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-backend:${{ github.sha }}
          
      # 3. إعطاء الـ Image تاغ latest ورفعها كنسخة أساسية
      - name: Tag as latest and Push
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/smart-backend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/smart-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-backend:latest
